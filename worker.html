<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0C10"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="stylesheet" href="css/style.css"/>
  <title>Worker — AR Safety</title>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p style="color:#8892A4;font-size:14px;margin-top:12px">Starting AR…</p></div>

<div class="ar-view worker-view">
  <div id="camera-wrapper">
    <video id="camera-feed" autoplay muted playsinline></video>
    <canvas id="ar-canvas"></canvas>

    <!-- Top status bar -->
    <div class="status-bar">
      <a href="index.html" class="back-btn">← Back</a>
      <div id="gps-status"    class="status-chip">GPS…</div>
      <div id="compass-status" class="status-chip">Compass…</div>
      <button id="mode-toggle-btn" class="mode-btn">🗺️ Map</button>
    </div>

    <!-- Zone legend (right side) -->
    <div class="zone-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#FF3B30"></div>Danger</div>
      <div class="legend-item"><div class="legend-dot" style="background:#34C759"></div>Safe</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF9500"></div>Restricted</div>
      <div class="legend-item"><div class="legend-dot" style="background:#007AFF"></div>Assembly</div>
    </div>

    <!-- iOS compass permission -->
    <button id="ios-compass-btn" style="display:none">🧭 Enable Compass</button>
    <div id="status-msg" class="status-msg" style="opacity:0" aria-live="polite"></div>
  </div>

  <!-- Bottom info bar -->
  <div class="worker-bottom">
    <div class="bottom-bar">
      <span class="zone-count-chip" id="zone-count">Loading…</span>
      <span id="nearest-zone" class="nearest-chip"></span>
    </div>
  </div>
</div>

<script>
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function')
    document.getElementById('ios-compass-btn').style.display='block';
</script>
<script type="module">
  const ov=document.getElementById('loading-overlay');
  document.getElementById('camera-feed').addEventListener('playing',()=>{
    ov.classList.add('hidden'); setTimeout(()=>ov.remove(),600);
  });
</script>
<script type="module" src="js/worker.js"></script>
</body>
</html>
